<!DOCTYPE html>
<html>
<head>

<title>Birthday Surprise</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.message{
font-size:60px;
font-weight:bold;
opacity:0;
transform:scale(0.5);
transition:1.5s;
text-align:center;
}

.show{
opacity:1;
transform:scale(1.2);
color:#ffd700;
}

.sub{
font-size:24px;
margin-top:15px;
opacity:0;
transition:1s;
}

.showSub{
opacity:1;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div id="msg" class="message">
🎉 Happy Birthday My Love 🎉
</div>

<div id="sub" class="sub">
A beautiful surprise is waiting for you ❤️
</div>

<script>

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let rockets=[];
let particles=[];
let rocketCount=0;

/* SOUND EFFECT */

function playBoom(){

let audioCtx=new (window.AudioContext || window.webkitAudioContext)();

let buffer=audioCtx.createBuffer(1,4096,audioCtx.sampleRate);
let data=buffer.getChannelData(0);

for(let i=0;i<4096;i++){
data[i]=Math.random()*2-1;
}

let noise=audioCtx.createBufferSource();
noise.buffer=buffer;

let gain=audioCtx.createGain();
gain.gain.setValueAtTime(1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.4);

noise.connect(gain);
gain.connect(audioCtx.destination);

noise.start();

}

/* CREATE ROCKET */

function createRocket(){

rockets.push({
x:Math.random()*canvas.width,
y:canvas.height,
vy:-9-Math.random()*4
});

}

/* EXPLOSION */

function explode(x,y){

playBoom();

let colors=[
"#ff0000","#ff7300","#ffd000","#00ff00",
"#00e1ff","#004cff","#b700ff","#ff1493"
];

for(let i=0;i<90;i++){

particles.push({

x:x,
y:y,
vx:(Math.random()-0.5)*10,
vy:(Math.random()-0.5)*10,
size:Math.random()*4+2,
color:colors[Math.floor(Math.random()*colors.length)],
alpha:1

});

}

}

/* DRAW LOOP */

function draw(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* rockets */

rockets.forEach((r,i)=>{

ctx.beginPath();
ctx.arc(r.x,r.y,3,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

r.y+=r.vy;

if(r.y<canvas.height/3){

explode(r.x,r.y);
rockets.splice(i,1);

}

});

/* particles */

particles.forEach((p,i)=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle=p.color;
ctx.fill();

p.x+=p.vx;
p.y+=p.vy;
p.alpha-=0.02;

if(p.alpha<=0){
particles.splice(i,1);
}

});

}

/* LAUNCH 50 ROCKETS */

let rocketInterval=setInterval(()=>{

createRocket();
rocketCount++;

if(rocketCount>=50){
clearInterval(rocketInterval);
}

},150);

/* animation */

setInterval(draw,30);

/* SHOW MESSAGE */

setTimeout(()=>{

document.getElementById("msg").classList.add("show");

setTimeout(()=>{
document.getElementById("sub").classList.add("showSub");
},800);

},6000);

/* REDIRECT */

setTimeout(()=>{

window.location.href="home.html";

},11000);

</script>

</body>
</html>
